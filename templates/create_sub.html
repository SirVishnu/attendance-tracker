{% extends "layout.html" %}
{% block title %}
Create
{% endblock %}
Create new subject
{% block main %}
<a class="back" href="{{url_for('group', id=id)}}"><img src="/static/images/back.png" alt="back button"></a>
<div class="page-container">
    <h3>Create New Subject</h3>
    <form action="{{ url_for('create_subject', id=id) }}" method="post">
        <div>
            <input required autofocus autocomplete="off" type="text" name="name" placeholder="Subject name">
        </div>
        <div>
            <button type="submit">Create</button>
        </div>
    </form>

    {% if error %}
        <p style="color: red; text-align: center;">{{error}}</p>
    {% endif %}
</div>
{% endblock %}
